<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-box">

    <h1>🌙 ঈদ মোবারক 🌙</h1>

    <p>Salami Login System</p>

    <div class="input-box">
        <input type="text" id="username" placeholder="সালামি গ্রহীতা">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="সালামির টাকা">
    </div>

    <button onclick="login()">
        লগ ইন
    </button>

    <div class="info">
        👤 Admin : Sakib <br>
        🔒 Pass : 100
    </div>

</div>

<script>

function login(){

    let user = document.getElementById('username').value;
    let pass = document.getElementById('password').value;

    if(user === 'Sakib' && pass === '100'){

        window.location.href = 'home.html';

    }
    else{

        alert('ভুল Username অথবা Password');

    }

}

</script>

</body>
</html>
